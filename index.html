<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 AI + Web3 Daily Pulse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #e0e0ff; font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
  #stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  .container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; }
  header { text-align: center; padding: 60px 0 40px; }
  header h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(1.8rem, 5vw, 3.2rem); font-weight: 900; background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 2px; line-height: 1.2; margin-bottom: 16px; }
  header p { color: #94a3b8; font-size: 1rem; font-weight: 300; letter-spacing: 1px; }
  .badges { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 24px 0; }
  .badge { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); border-radius: 20px; padding: 6px 16px; font-size: 0.78rem; color: #a78bfa; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }
  .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, #a78bfa55, #60a5fa55, transparent); margin: 32px 0; }
  #reports-list { display: flex; flex-direction: column; gap: 20px; }
  .report-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(167,139,250,0.2); border-radius: 16px; padding: 28px 32px; transition: all 0.3s ease; cursor: pointer; text-decoration: none; display: block; }
  .report-card:hover { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.5); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(167,139,250,0.15); }
  .report-date { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: #60a5fa; letter-spacing: 2px; margin-bottom: 10px; }
  .report-title { font-size: 1.15rem; font-weight: 500; color: #e2e8f0; margin-bottom: 8px; }
  .report-preview { font-size: 0.88rem; color: #64748b; line-height: 1.6; }
  .report-arrow { float: right; color: #a78bfa; font-size: 1.2rem; margin-top: -30px; }
  #report-view { display: none; background: rgba(255,255,255,0.03); border: 1px solid rgba(167,139,250,0.2); border-radius: 16px; padding: 40px; }
  #report-view h1, #report-view h2, #report-view h3 { font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 24px 0 12px; }
  #report-view p { line-height: 1.8; color: #cbd5e1; margin: 12px 0; }
  #report-view ul, #report-view ol { padding-left: 24px; color: #cbd5e1; line-height: 1.8; }
  #report-view hr { border-color: rgba(167,139,250,0.2); margin: 24px 0; }
  #report-view em { color: #64748b; font-size: 0.85rem; }
  #report-view a { color: #60a5fa; }
  .back-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.3); color: #a78bfa; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 28px; transition: all 0.2s; }
  .back-btn:hover { background: rgba(167,139,250,0.2); }
  .loading { text-align: center; color: #475569; padding: 60px; font-family: 'Orbitron', sans-serif; font-size: 0.85rem; letter-spacing: 2px; }
  .pulse { display: inline-block; width: 8px; height: 8px; background: #34d399; border-radius: 50%; margin-right: 8px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
  footer { text-align: center; margin-top: 60px; color: #334155; font-size: 0.8rem; letter-spacing: 1px; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="container">
  <header>
    <h1>🌌 AI + Web3 Daily Pulse</h1>
    <p><span class="pulse"></span>Daily insights generated by AI · Auto-committed by GitHub Actions</p>
    <div class="badges">
      <span class="badge">⚡ POWERED BY AI</span>
      <span class="badge">🔗 WEB3</span>
      <span class="badge">🚀 DAILY UPDATES</span>
    </div>
  </header>
  <div class="divider"></div>
  <div id="reports-list"><div class="loading">⟳ LOADING REPORTS...</div></div>
  <div id="report-view">
    <button class="back-btn" onclick="showList()">← BACK TO ALL REPORTS</button>
    <div id="report-content"></div>
  </div>
  <footer><p>Built with 🤖 AI · Deployed on GitHub Pages · Updates every day</p></footer>
</div>
<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const stars = Array.from({length: 180}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  r: Math.random() * 1.5 + 0.2,
  speed: Math.random() * 0.3 + 0.05,
  opacity: Math.random()
}));
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.opacity += (Math.random() - 0.5) * 0.02;
    s.opacity = Math.max(0.1, Math.min(1, s.opacity));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(167,139,250,${s.opacity})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
async function loadReports() {
  try {
    const res = await fetch('reports/index.json');
    if (!res.ok) throw new Error('no index');
    const files = await res.json();
    renderList(files);
  } catch {
    document.getElementById('reports-list').innerHTML = '<div class="loading">🚀 FIRST REPORT COMING SOON...</div>';
  }
}
function renderList(files) {
  const list = document.getElementById('reports-list');
  if (!files.length) { list.innerHTML = '<div class="loading">🚀 FIRST REPORT COMING SOON...</div>'; return; }
  list.innerHTML = files.sort().reverse().map(f => {
    const date = f.replace('.md','');
    return `<a class="report-card" onclick="loadReport('${f}'); return false;" href="#">
      <div class="report-date">📡 ${date}</div>
      <div class="report-title">🌌 AI + Web3 Daily Pulse — ${date}</div>
      <div class="report-preview">Daily AI-generated insights on Web3 trends, on-chain developments and alpha.</div>
      <span class="report-arrow">→</span>
    </a>`;
  }).join('');
}
async function loadReport(filename) {
  const res = await fetch(`reports/${filename}`);
  const text = await res.text();
  document.getElementById('reports-list').style.display = 'none';
  const view = document.getElementById('report-view');
  view.style.display = 'block';
  document.getElementById('report-content').innerHTML = simpleMarkdown(text);
  window.scrollTo(0,0);
}
function showList() {
  document.getElementById('report-view').style.display = 'none';
  document.getElementById('reports-list').style.display = 'flex';
}
function simpleMarkdown(md) {
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hul]|<hr)(.+)$/gm, '<p>$1</p>');
}
loadReports();
</script>
</body>
</html>
